name: Testes - Estacao de referencia

on:
  push:
    paths:
      - "testes_ci_estacao/**"
      - ".github/workflows/testes-ci-estacao.yml"
  pull_request:
    paths:
      - "testes_ci_estacao/**"
      - ".github/workflows/testes-ci-estacao.yml"

jobs:
  cpp:
    name: C++ - controlador
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v6

      - name: Compilar testes C++
        working-directory: testes_ci_estacao/dispositivo_cpp
        run: |
          mkdir -p build
          g++ -std=c++17 -Wall -Wextra -pedantic -Iinclude tests/test_controlador.cpp -o build/test_controlador

      - name: Executar testes C++
        working-directory: testes_ci_estacao/dispositivo_cpp
        run: ./build/test_controlador

  python:
    name: Python - supervisor
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        working-directory: testes_ci_estacao/supervisor_python
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Executar testes Python
        working-directory: testes_ci_estacao/supervisor_python
        run: python -m pytest -q

